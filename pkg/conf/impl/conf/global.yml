model-tags:
  - model: "^claude-.*"
    tag: "anthropic"
  - model: "^gpt-.*"
    tag: "openai"
  - model: ".*codex.*"
    tag: "codex"
  - model: "^kimi.*"
    tag: "kimi"
  - model: "^moonshot.*"
    tag: "kimi"
  - model: ".*-instruct$"
    tag: "instruct"
  - model: ".*:latest$"
    tag: "latest"

tool-selection:
  default:
    vfsPatch: false
  tags:
    codex:
      vfsPatch: true
      vfsEdit: false
      vfsWrite: false
      vfsDelete: false

llm-retry-max-attempts: 10
llm-retry-max-backoff-seconds: 60
context-compaction-threshold: 0.95

shadow-paths:
  - AGENTS.md
  - "**/AGENTS.md"
  - .agentsignore
  - "**/.agentsignore"
  - .agents/**
  - .csw/**
  - .cswdata/**
