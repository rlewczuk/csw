model_tags:
  - model: "^claude-.*"
    tag: "anthropic"
  - model: "^gpt-.*"
    tag: "openai"
  - model: ".*codex.*"
    tag: "codex"
  - model: "^kimi.*"
    tag: "kimi"
  - model: "^moonshot.*"
    tag: "kimi"
  - model: ".*-instruct$"
    tag: "instruct"
  - model: ".*:latest$"
    tag: "latest"

tool_selection:
  default:
    vfsPatch: false
  tags:
    codex:
      vfsPatch: true
      vfsEdit: false
      vfsWrite: false
      vfsDelete: false

llm_retry_max_attempts: 10
llm_retry_max_backoff_seconds: 60
