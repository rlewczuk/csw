type: ollama
name: ollama-local
description: Local Ollama instance
url: http://localhost:11434
connect_timeout: 30s
request_timeout: 300s
default_temperature: 0.7
default_top_p: 0.9
default_top_k: 40
context_length_limit: 8192
model_tags:
  - model: ".*:latest$"
    tag: "latest"
  - model: ".*-instruct$"
    tag: "instruct"
