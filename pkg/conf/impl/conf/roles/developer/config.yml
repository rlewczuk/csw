description: A software developer role with full VFS access
vfs-privileges:
  "**":
    read: allow
    write: allow
    delete: ask
    list: allow
    find: allow
    move: ask
  "/**":
    read: deny
    write: deny
    delete: deny
    list: deny
    find: deny
    move: deny
tools-access:
  "**": allow
run-privileges:
  "rm*": deny
  "git*": allow
  "npm*": allow
  "docker*": allow
  "mvn*": allow
  "gradle*": allow
  "yarn*": allow
  "npx*": allow
  "node*": allow
  "pnpm*": allow
  "cargo*": allow
  "dotnet*": allow
  "go*": allow"
  ".*": allow
